name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.out ./...
      - name: coverage
        run: go tool cover -func=coverage.out

  test-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: stable
      - name: test
        run: go test -race ./...
      - name: lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run --tests=false
      - name: vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: build plugin
        run: go run github.com/caddyserver/xcaddy/cmd/xcaddy@v0.4.6 build --with github.com/abs3ntdev/caddy-pangolin=.
      - name: verify modules
        run: |
          ./caddy list-modules | grep -q '^http.matchers.pangolin_https_backend$'
          ./caddy list-modules | grep -q '^http.matchers.pangolin_local$'
          ./caddy list-modules | grep -q '^http.matchers.pangolin_remote$'
          ./caddy list-modules | grep -q '^http.reverse_proxy.upstreams.pangolin$'
